<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>HTML 可视化编辑器</title>
    <!--
      单文件、零依赖的 HTML 可视化编辑器（任务 12.1 组装产物）。
      可直接通过 file:// 打开运行：所有逻辑内联于下方单个 <script> 中，
      无任何外部 <script src> 依赖；预览 iframe 固定 sandbox="allow-scripts allow-same-origin"。
      内联模块：color / file-validation / input-validation / inject / change-counter /
                exporter / property-panel / file-loader / preview-frame / message-bus，
                以及运行于 iframe 内部的自包含注入函数 __editorFn。
    -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px
        }

        .topbar {
            height: 48px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            flex-shrink: 0;
            -webkit-user-select: none;
            user-select: none
        }

        .logo {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            letter-spacing: -.5px;
            margin-right: 8px
        }

        .logo span {
            color: #00d4aa
        }

        .sep {
            width: 1px;
            height: 20px;
            background: #e0e0e0;
            margin: 0 4px
        }

        .f1 {
            flex: 1
        }

        .tbtn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #d0d0d0;
            background: #fff;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            transition: all .12s;
            white-space: nowrap;
            font-family: inherit
        }

        .tbtn:hover {
            background: #f8f8f8;
            color: #333;
            border-color: #b0b0b0
        }

        .tbtn.accent {
            background: #00d4aa;
            color: #000;
            border-color: #00d4aa;
            font-weight: 600
        }

        .tbtn.accent:hover {
            background: #00eebb
        }

        .tbtn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none
        }

        .filelabel {
            font-size: 11px;
            color: #666;
            padding: 3px 10px;
            border-radius: 4px;
            background: #f0f0f0;
            border: 1px solid #d0d0d0;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden
        }

        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafafa;
            overflow: hidden;
            position: relative
        }

        .canvas-bar {
            height: 32px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 6px;
            font-size: 11px;
            flex-shrink: 0
        }

        .canvas-bar .path {
            color: #666;
            font-family: monospace;
            font-size: 11px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .canvas-bar .hint {
            color: #999;
            white-space: nowrap
        }

        .canvas-scroll {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 28px 28px 48px;
            background: #fafafa
        }

        .canvas-frame {
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, .08), 0 8px 24px rgba(0, 0, 0, .12);
            width: 100%;
            max-width: 1280px;
            position: relative;
            min-height: 500px
        }

        #previewFrame {
            width: 100%;
            min-height: 500px;
            border: none;
            border-radius: 6px;
            display: none;
            background: #fff
        }

        .welcome {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border-radius: 6px;
            padding: 40px
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: #e8f8f5;
            border: 1px solid #00d4aa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px
        }

        .welcome h2 {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            letter-spacing: -.3px
        }

        .welcome>p {
            font-size: 13px;
            color: #666;
            text-align: center;
            line-height: 1.7;
            max-width: 300px
        }

        .dropzone {
            border: 1.5px dashed #d0d0d0;
            border-radius: 12px;
            padding: 28px 60px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            margin-top: 4px;
            background: #fafafa
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: #00d4aa;
            background: #e8f8f5
        }

        .dz-icon {
            font-size: 28px;
            margin-bottom: 8px
        }

        .dz-main {
            font-size: 13px;
            color: #333;
            margin-bottom: 3px;
            font-weight: 500
        }

        .dz-sub {
            font-size: 11px;
            color: #999
        }

        .wlink {
            font-size: 12px;
            color: #666;
            margin-top: 2px
        }

        .wlink span {
            color: #00d4aa;
            cursor: pointer;
            font-weight: 500
        }

        .wlink span:hover {
            text-decoration: underline
        }

        .statusbar {
            height: 22px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 12px;
            font-size: 11px;
            color: #3a3a3a;
            flex-shrink: 0
        }

        .sdot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #d0d0d0;
            transition: background .15s
        }

        #statusText {
            color: #666
        }

        #changeCount {
            color: #999
        }

        .panel {
            width: 256px;
            background: #fff;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0
        }

        .panel-head {
            height: 32px;
            padding: 0 14px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            flex-shrink: 0
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px
        }

        .panel-body::-webkit-scrollbar {
            width: 4px
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 2px
        }

        .panel-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #999;
            font-size: 12px;
            text-align: center;
            padding: 20px
        }

        .panel-empty .pe-icon {
            font-size: 32px
        }

        .el-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: #00d4aa12;
            color: #00d4aa;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            font-weight: 600;
            border: 1px solid #00d4aa25;
            margin-bottom: 14px
        }

        .ps {
            margin-bottom: 16px
        }

        .pl {
            font-size: 10px;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: .6px;
            font-weight: 600
        }

        input.pi,
        textarea.pi,
        select.pi {
            width: 100%;
            padding: 6px 9px;
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 5px;
            color: #333;
            font-size: 12px;
            outline: none;
            transition: border-color .12s;
            font-family: inherit
        }

        input.pi:focus,
        textarea.pi:focus,
        select.pi:focus {
            border-color: #00d4aa;
            background: #fafafa
        }

        select.pi {
            cursor: pointer;
            appearance: none
        }

        textarea.pi {
            resize: vertical;
            min-height: 72px;
            line-height: 1.5
        }

        .pi-row {
            display: flex;
            gap: 6px
        }

        .pi-row .pi {
            flex: 1
        }

        .color-row {
            display: flex;
            gap: 6px;
            align-items: center
        }

        .color-row input[type="color"] {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 1px solid #d0d0d0;
            background: #fff;
            padding: 2px;
            cursor: pointer;
            flex-shrink: 0
        }

        .color-row .pi {
            flex: 1
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 14px 0
        }

        .abtn {
            width: 100%;
            padding: 7px 10px;
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 5px;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            transition: all .12s;
            margin-bottom: 6px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit
        }

        .abtn:hover {
            background: #f8f8f8;
            color: #333;
            border-color: #b0b0b0
        }

        .abtn.danger:hover {
            color: #ff6b6b;
            border-color: #ff6b6b;
            background: #fff5f5
        }

        .seg {
            display: flex;
            gap: 6px
        }

        .seg .abtn {
            flex: 1;
            justify-content: center;
            margin: 0
        }

        .seg .abtn.active {
            background: #00d4aa;
            color: #fff;
            border-color: #00d4aa;
            font-weight: 600
        }

        /* 字段级无效提示（需求 5.13 / 5.14 / 7.3 / 7.6）。默认隐藏，apply* 校验失败时显示。 */
        .perr {
            color: #ff6b6b;
            font-size: 10px;
            margin-top: 4px;
            line-height: 1.4;
            display: none
        }

        /* 面板级共享提示（如删除时无可删除元素，需求 8.5）。 */
        .panel-notice {
            color: #ff6b6b;
            font-size: 11px;
            margin-top: 10px;
            padding: 7px 9px;
            background: #fff5f5;
            border: 1px solid #ffcccc;
            border-radius: 5px;
            line-height: 1.4;
            display: none
        }

        /* 元素树面板样式 */
        .tree-panel {
            width: 240px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0
        }

        .tree-head {
            height: 32px;
            padding: 0 14px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            flex-shrink: 0
        }

        .tree-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0
        }

        .tree-body::-webkit-scrollbar {
            width: 4px
        }

        .tree-body::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 2px
        }

        .tree-node {
            user-select: none
        }

        .tree-node-row {
            display: flex;
            align-items: center;
            height: 28px;
            cursor: pointer;
            transition: background 0.1s;
            gap: 4px;
            font-size: 12px
        }

        .tree-node-row:hover {
            background: #f5f5f5
        }

        .tree-node-row.selected {
            background: #e3f2fd;
            color: #1976d2
        }

        .tree-toggle {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #666;
            cursor: pointer;
            flex-shrink: 0
        }

        .tree-toggle:hover {
            color: #333
        }

        .tree-toggle-placeholder {
            width: 16px;
            height: 16px;
            flex-shrink: 0
        }

        .tree-tag {
            color: #1976d2;
            font-family: monospace;
            font-size: 11px;
            font-weight: 500
        }

        .tree-id {
            color: #d32f2f;
            font-family: monospace;
            font-size: 11px;
            margin-left: 4px
        }

        .tree-class {
            color: #7b1fa2;
            font-family: monospace;
            font-size: 11px;
            margin-left: 4px
        }

        .tree-text {
            color: #666;
            font-size: 11px;
            margin-left: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .tree-children {
            display: block
        }

        /* 属性分组样式 */
        .prop-group {
            margin-bottom: 12px
        }

        .prop-group-head {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
            cursor: pointer;
            user-select: none;
            font-size: 11px;
            font-weight: 600;
            color: #666;
            border-bottom: 1px solid #e0e0e0
        }

        .prop-group-head:hover {
            color: #333
        }

        .group-icon {
            font-size: 10px;
            transition: transform 0.2s
        }

        .group-icon.collapsed {
            transform: rotate(-90deg)
        }

        .prop-group-body {
            padding-top: 8px
        }

        .prop-group-body.collapsed {
            display: none
        }

        /* 布局编辑器样式 */
        .layout-editor {
            margin-top: 8px
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px
        }

        .control-label {
            font-size: 11px;
            color: #666;
            min-width: 60px
        }

        .control-input {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 11px;
            font-family: inherit
        }

        .btn-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap
        }

        .layout-btn {
            padding: 4px 8px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            background: #fff;
            color: #666;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.1s;
            font-family: inherit
        }

        .layout-btn:hover {
            background: #f5f5f5;
            border-color: #b0b0b0
        }

        .layout-btn.active {
            background: #e3f2fd;
            border-color: #1976d2;
            color: #1976d2;
            font-weight: 500
        }

        .layout-editor-empty {
            font-size: 11px;
            color: #999;
            padding: 12px;
            text-align: center;
            background: #f9f9f9;
            border-radius: 4px
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">HTML<span>Edit</span></div>
        <div class="sep"></div>
        <span class="filelabel" id="fileName">未打开文件</span>
        <div class="sep"></div>
        <button class="tbtn" id="openBtn">📂 打开文件</button>
        <input type="file" id="fileIn" accept=".html,.htm" style="display:none">
        <button class="tbtn" id="demoBtn">✨ 示例页面</button>
        <div class="f1"></div>
        <button class="tbtn" id="undoBtn" disabled title="撤销 (Ctrl+Z)">↶ 撤销</button>
        <button class="tbtn" id="redoBtn" disabled title="重做 (Ctrl+Y)">↷ 重做</button>
        <div class="sep"></div>
        <span class="filelabel" id="autoSaveStatus" style="color:#666;margin-right:8px">未保存</span>
        <button class="tbtn accent" id="exportBtn" style="display:none">⬇ 导出 HTML</button>
    </div>

    <div class="main">
        <!-- 元素树面板 -->
        <div class="tree-panel" id="treePanel" style="display:none">
            <div class="tree-head">Components</div>
            <div class="tree-body" id="treeBody">
                <!-- 元素树将在这里动态生成 -->
            </div>
        </div>

        <div class="canvas-area" id="canvasArea">
            <div class="canvas-bar">
                <span class="path" id="elemPath">— 请打开 HTML 文件开始编辑</span>
                <span class="hint" id="barHint">拖拽文件或点击「打开文件」</span>
            </div>
            <div class="canvas-scroll" id="canvasScroll">
                <div class="canvas-frame" id="canvasFrame">
                    <div class="welcome" id="welcome">
                        <div class="welcome-icon">📄</div>
                        <h2>HTML 可视化编辑器</h2>
                        <p>打开任意 HTML 文件，在预览界面直接点击编辑内容，无需接触代码</p>
                        <div class="dropzone" id="dropzone">
                            <div class="dz-icon">🗂️</div>
                            <div class="dz-main">点击选择 HTML 文件</div>
                            <div class="dz-sub">或将文件拖拽到此处</div>
                        </div>
                        <div class="wlink">也可以 <span id="demoLink">加载示例页面</span> 快速体验</div>
                    </div>
                    <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </div>
            <div class="statusbar">
                <div class="sdot" id="statusDot"></div>
                <span id="statusText">就绪</span>
                <span class="f1"></span>
                <span id="changeCount"></span>
            </div>
        </div>

        <div class="panel">
            <div class="panel-head">属性面板</div>
            <div class="panel-body">
                <!-- 空态占位（未选中元素时显示，PANEL_CONTROL_IDS.panelEmpty） -->
                <div class="panel-empty" id="panelEmpty">
                    <div class="pe-icon">👆</div>
                    <div>在左侧页面中<br><strong style="color:#666">点击任意元素</strong><br>即可在此编辑</div>
                </div>

                <!-- 表单容器（选中元素时显示，PANEL_CONTROL_IDS.editForm） -->
                <div id="editForm" style="display:none">
                    <div class="el-badge" id="elBadge">&lt;div&gt;</div>

                    <!-- 文字内容分组（<img> 时隐藏，PANEL_CONTROL_IDS.grpText） -->
                    <div class="ps" id="grpText">
                        <div class="pl">文字内容</div>
                        <textarea class="pi" id="pText" rows="3" placeholder="元素文字..."></textarea>
                        <div class="perr" id="pTextErr"></div>
                        <div style="font-size:10px;color:#444;margin-top:3px">💡 双击预览中的文字可直接编辑</div>
                    </div>

                    <div class="ps">
                        <div class="pl">字体大小 / 粗细</div>
                        <div class="pi-row">
                            <input class="pi" id="pFontSize" type="number" placeholder="大小" style="width:70px;flex:none">
                            <span style="color:#444;align-self:center;font-size:11px">px</span>
                            <select class="pi" id="pFontWeight">
                                <option value="">粗细</option>
                                <option value="300">细 300</option>
                                <option value="400">正常 400</option>
                                <option value="500">中 500</option>
                                <option value="600">半粗 600</option>
                                <option value="700">粗 700</option>
                                <option value="900">黑 900</option>
                            </select>
                        </div>
                        <div class="perr" id="pFontSizeErr"></div>
                        <div class="perr" id="pFontWeightErr"></div>
                    </div>

                    <div class="ps">
                        <div class="pl">文字对齐</div>
                        <div class="seg">
                            <button class="abtn" data-align="left">左</button>
                            <button class="abtn" data-align="center">中</button>
                            <button class="abtn" data-align="right">右</button>
                        </div>
                    </div>

                    <div class="ps">
                        <div class="pl">文字颜色</div>
                        <div class="color-row">
                            <input type="color" id="pColor">
                            <input class="pi" id="pColorTxt" type="text" placeholder="#000000">
                        </div>
                        <div class="perr" id="pColorTxtErr"></div>
                    </div>

                    <div class="ps">
                        <div class="pl">背景颜色</div>
                        <div class="color-row">
                            <input type="color" id="pBg">
                            <input class="pi" id="pBgTxt" type="text" placeholder="#ffffff">
                        </div>
                        <div class="perr" id="pBgTxtErr"></div>
                    </div>

                    <div class="ps">
                        <div class="pl">内边距 / 圆角 (px)</div>
                        <div class="pi-row">
                            <input class="pi" id="pPad" type="number" placeholder="内边距">
                            <input class="pi" id="pRadius" type="number" placeholder="圆角">
                        </div>
                        <div class="perr" id="pPadErr"></div>
                        <div class="perr" id="pRadiusErr"></div>
                    </div>

                    <div class="ps">
                        <div class="pl">宽度 / 高度</div>
                        <div class="pi-row">
                            <input class="pi" id="pWidth" type="text" placeholder="宽 (px / %)">
                            <input class="pi" id="pHeight" type="text" placeholder="高 (px / auto)">
                        </div>
                        <div class="perr" id="pWidthErr"></div>
                        <div class="perr" id="pHeightErr"></div>
                    </div>

                    <!-- 图片专属分组（仅 <img> 显示，PANEL_CONTROL_IDS.grpImg） -->
                    <div class="ps" id="grpImg" style="display:none">
                        <div class="pl">图片地址 (src)</div>
                        <input class="pi" id="pSrc" type="text" placeholder="https://..." maxlength="2048">
                        <div class="perr" id="pSrcErr"></div>
                    </div>

                    <!-- 链接专属分组（仅 <a> 显示，PANEL_CONTROL_IDS.grpLink） -->
                    <div class="ps" id="grpLink" style="display:none">
                        <div class="pl">链接地址 (href)</div>
                        <input class="pi" id="pHref" type="text" placeholder="https://..." maxlength="2048">
                        <div class="perr" id="pHrefErr"></div>
                    </div>

                    <div class="divider"></div>
                    <button class="abtn danger" id="pDelete">🗑️ 删除此元素</button>
                    <!-- 面板级共享提示区（PANEL_CONTROL_IDS.panelNotice） -->
                    <div class="panel-notice" id="panelNotice"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // HTML 可视化编辑器 — 单文件内联组装（任务 12.1）
        //
        // 本 <script> 把开发期 src/ 各模块的逻辑内联为同一作用域的普通 JS（去除 ESM
        // import/export），产出零依赖、可 file:// 直接打开的单文件。结构：
        //   A) __editorFn —— 运行于 iframe 内部的「自包含」注入函数（经 .toString() 注入）。
        //   B) 父上下文模块：color / file-validation / input-validation / inject /
        //      change-counter / exporter / property-panel / file-loader / preview-frame /
        //      message-bus（逐一内联，行为与 src/ 保持一致）。
        //   C) 接线（DOM ready 后）：顶栏打开/导出、地址栏、属性面板、状态栏、消息总线。
        // ============================================================================

        'use strict';

        // ============================================================================
        // A) 注入编辑器函数 __editorFn（运行于 sandbox iframe 内部）
        //
        // 必须「自包含」：注入后 iframe 内无模块系统，函数体内不得引用父作用域的任何
        // 内联函数/变量。所有依赖（颜色转换、可编辑判定、getInfo、事件处理、消息处理）
        // 均定义在函数内部。函数末尾注册 document 级事件监听与 window 'message' 监听，
        // 并向父窗口 post {type:'ready'}。
        //
        // 注入方式：父侧 buildEditorScript(__editorFn) 会以 '(' + __editorFn.toString() +
        // ')()' 拼接为 <script id="__htmledit__"> 文本，再由 injectInto 写入用户 HTML。
        // ============================================================================
        var __editorFn = function() {
            // ---- 不可编辑（结构性 / 非可视）标签集合（需求 9） ----
            var SKIP = new Set([
                'HTML', 'HEAD', 'META', 'LINK', 'TITLE', 'STYLE', 'SCRIPT', 'BASE', 'NOSCRIPT'
            ]);
            var INNER_TEXT_CAP = 500;
            var HOVER_OUTLINE = '2px solid rgba(0,212,170,0.35)';
            var SELECT_OUTLINE = '2px solid #00d4aa';
            var SAVED_OUTLINE_ATTR = 'data-saved-outline';

            // ---- 交互状态 ----
            var selectedEl = null;
            var hoveredEl = null;
            var editingEl = null;

            // ---- 颜色转换（rgb()/rgba() → Hex，本地副本，与 src/color.js 一致） ----
            var RGB_PATTERN = /^rgba?\(\s*(\d{1,3})\s*[,\s]\s*(\d{1,3})\s*[,\s]\s*(\d{1,3})\s*(?:[,/]\s*([0-9]*\.?[0-9]+)\s*)?\)$/i;

            function channelToHex(n) {
                return n.toString(16).padStart(2, '0');
            }

            function rgbToHex(rgbString) {
                if (typeof rgbString !== 'string') return null;
                var input = rgbString.trim();
                if (input.toLowerCase() === 'transparent') return '';
                var match = input.match(RGB_PATTERN);
                if (!match) return null;
                var r = Number(match[1]),
                    g = Number(match[2]),
                    b = Number(match[3]);
                if (r > 255 || g > 255 || b > 255) return null;
                var hasAlpha = match[4] !== undefined;
                var alpha = hasAlpha ? Number(match[4]) : 1;
                if (alpha < 0 || alpha > 1) return null;
                if (hasAlpha && alpha === 0 && r === 0 && g === 0 && b === 0) return '';
                var base = '#' + channelToHex(r) + channelToHex(g) + channelToHex(b);
                if (hasAlpha && alpha < 1) return base + channelToHex(Math.round(alpha * 255));
                return base;
            }

            function colorToHexOrEmpty(rgbString) {
                var hex = rgbToHex(rgbString);
                return hex == null ? '' : hex;
            }

            // ---- DOM 工具 ----
            function computedStyleOf(el) {
                var view = (el && el.ownerDocument && el.ownerDocument.defaultView) ||
                    (typeof window !== 'undefined' ? window : null);
                if (view && typeof view.getComputedStyle === 'function') {
                    return view.getComputedStyle(el);
                }
                return null;
            }

            function hasDirectText(el) {
                var children = el.childNodes || [];
                for (var i = 0; i < children.length; i++) {
                    var node = children[i];
                    if (node.nodeType === 3 && node.textContent && node.textContent.trim() !== '') {
                        return true;
                    }
                }
                return false;
            }

            function cssPath(el) {
                if (!el || el.nodeType !== 1) return '';
                var parts = [];
                var node = el;
                while (node && node.nodeType === 1 && node.tagName && node.tagName.toUpperCase() !== 'HTML') {
                    var tagName = node.tagName.toLowerCase();
                    if (node.id) {
                        parts.unshift(tagName + '#' + node.id);
                        break;
                    }
                    var index = 1;
                    var sibling = node.previousElementSibling;
                    while (sibling) {
                        if (sibling.tagName === node.tagName) index++;
                        sibling = sibling.previousElementSibling;
                    }
                    parts.unshift(tagName + ':nth-of-type(' + index + ')');
                    node = node.parentElement;
                }
                return parts.join(' > ');
            }

            // ---- 可编辑判定（需求 9.1 / 9.2 / 4.5） ----
            function isEditable(el) {
                if (!el || el.nodeType !== 1 || !el.tagName) return false;
                return !SKIP.has(el.tagName.toUpperCase());
            }

            function isTextEditable(el) {
                if (!isEditable(el)) return false;
                if (el.tagName.toUpperCase() === 'IMG') return false;
                return hasDirectText(el);
            }

            // ---- 选中信息读取（需求 3.4，Property 8） ----
            function getInfo(el) {
                if (!el || el.nodeType !== 1) {
                    return {
                        tag: '',
                        innerText: '',
                        color: '',
                        backgroundColor: '',
                        fontSize: 0,
                        fontWeight: '',
                        width: '',
                        height: '',
                        src: '',
                        href: '',
                        inlineStyle: '',
                        path: '',
                        elementPath: []
                    };
                }
                var tag = el.tagName.toUpperCase();
                var computed = computedStyleOf(el);
                var rawText = (el.innerText != null ? el.innerText : el.textContent) || '';
                var innerText = rawText.slice(0, INNER_TEXT_CAP);
                var fontSize = 0;
                if (computed) {
                    var parsed = parseFloat(computed.fontSize);
                    fontSize = Number.isFinite(parsed) ? Math.round(parsed) : 0;
                }
                return {
                    tag: tag,
                    innerText: innerText,
                    color: computed ? colorToHexOrEmpty(computed.color) : '',
                    backgroundColor: computed ? colorToHexOrEmpty(computed.backgroundColor) : '',
                    fontSize: fontSize,
                    fontWeight: computed ? String(computed.fontWeight || '') : '',
                    width: el.style ? el.style.width || '' : '',
                    height: el.style ? el.style.height || '' : '',
                    src: tag === 'IMG' ? el.getAttribute('src') || '' : '',
                    href: tag === 'A' ? el.getAttribute('href') || '' : '',
                    inlineStyle: el.getAttribute('style') || '',
                    path: cssPath(el),
                    elementPath: getElementPath(el, document.body)
                };
            }

            // ---- 上行消息发送（仅经 postMessage 与 Editor 通信，需求 2.4） ----
            function post(msg) {
                if (typeof parent !== 'undefined' && parent && typeof parent.postMessage === 'function') {
                    parent.postMessage(msg, '*');
                    return;
                }
                if (typeof window !== 'undefined' && window && typeof window.postMessage === 'function') {
                    window.postMessage(msg, '*');
                }
            }

            // ---- 编辑态 outline 读写（维护 data-saved-outline 契约，供 exporter 还原） ----
            function applyOutline(el, value) {
                if (!el || !el.style) return;
                if (typeof el.hasAttribute === 'function' && !el.hasAttribute(SAVED_OUTLINE_ATTR)) {
                    el.setAttribute(SAVED_OUTLINE_ATTR, el.style.outline || '');
                }
                el.style.outline = value;
                el.style.outlineOffset = '1px';
                el.style.cursor = 'pointer';
            }

            function restoreOutline(el) {
                if (!el || !el.style) return;
                var saved = typeof el.getAttribute === 'function' ? el.getAttribute(SAVED_OUTLINE_ATTR) : null;
                el.style.outline = saved || '';
                el.style.outlineOffset = '';
                el.style.cursor = '';
                if (typeof el.removeAttribute === 'function') el.removeAttribute(SAVED_OUTLINE_ATTR);
            }

            // ---- 事件处理：悬停/选中（需求 3.x / 9.x） ----
            function onMouseOver(e) {
                var el = e && e.target;
                if (!isEditable(el)) return;
                if (el === selectedEl) return;
                if (hoveredEl && hoveredEl !== selectedEl) restoreOutline(hoveredEl);
                hoveredEl = el;
                applyOutline(hoveredEl, HOVER_OUTLINE);
            }

            function onMouseOut(e) {
                if (hoveredEl && hoveredEl !== selectedEl) {
                    restoreOutline(hoveredEl);
                    hoveredEl = null;
                }
            }

            function onClick(e) {
                var el = e && e.target;
                if (!isEditable(el)) return;
                if (typeof e.preventDefault === 'function') e.preventDefault();
                if (typeof e.stopPropagation === 'function') e.stopPropagation();
                if (selectedEl && selectedEl !== el) {
                    restoreOutline(selectedEl);
                    if (selectedEl.contentEditable === 'true') selectedEl.contentEditable = 'false';
                }
                selectedEl = el;
                applyOutline(selectedEl, SELECT_OUTLINE);
                post({
                    type: 'selected',
                    info: getInfo(selectedEl)
                });
            }

            // ---- 事件处理：双击内联编辑（需求 4.x） ----
            function readFullText(el) {
                if (!el) return '';
                var text = el.innerText != null ? el.innerText : el.textContent;
                return text || '';
            }

            function onDblClick(e) {
                var el = e && e.target;
                if (!isTextEditable(el)) return;
                editingEl = el;
                el.contentEditable = 'true';
                if (typeof el.focus === 'function') el.focus();
                post({
                    type: 'editing'
                });
            }

            function onInput(e) {
                var el = (e && e.target) || editingEl;
                if (!el) return;
                if (el.contentEditable === 'true' && el === editingEl) {
                    post({
                        type: 'textInput',
                        text: readFullText(el)
                    });
                }
            }

            function onBlur(e) {
                var el = (e && e.target) || editingEl;
                if (el && el.contentEditable === 'true') el.contentEditable = 'false';
                if (el === editingEl) editingEl = null;
            }

            // ---- 辅助函数：根据路径查找元素 ----
            function findElementByPath(path) {
                if (!path || path.length === 0) return null;
                var el = document.body;
                for (var i = 0; i < path.length; i++) {
                    if (!el || !el.children) return null;
                    el = el.children[path[i]];
                }
                return el;
            }

            // ---- 下行 update / delete 指令处理（需求 5.1 / 8.1 / 8.4） ----
            function onMessage(e) {
                var data = e && e.data;
                if (!data) return;

                // 命令模式消息处理
                if (data.type === 'updateStyle') {
                    var el = findElementByPath(data.elementPath);
                    if (el && el.style) {
                        el.style[data.property] = data.value;
                    }
                    return;
                }

                if (data.type === 'updateText') {
                    var el = findElementByPath(data.elementPath);
                    if (el) {
                        el.textContent = data.text;
                    }
                    return;
                }

                if (data.type === 'updateAttribute') {
                    var el = findElementByPath(data.elementPath);
                    if (el && typeof el.setAttribute === 'function') {
                        el.setAttribute(data.attribute, data.value);
                    }
                    return;
                }

                if (data.type === 'deleteElement') {
                    var el = findElementByPath(data.elementPath);
                    if (el) {
                        if (el.parentNode && typeof el.parentNode.removeChild === 'function') {
                            el.parentNode.removeChild(el);
                        } else if (typeof el.remove === 'function') {
                            el.remove();
                        }
                    }
                    return;
                }

                if (data.type === 'restoreElement') {
                    var parent = findElementByPath(data.parentPath);
                    if (parent) {
                        var temp = document.createElement('div');
                        temp.innerHTML = data.elementHTML;
                        var restored = temp.firstChild;
                        if (restored) {
                            if (data.indexInParent >= parent.children.length) {
                                parent.appendChild(restored);
                            } else {
                                parent.insertBefore(restored, parent.children[data.indexInParent]);
                            }
                        }
                    }
                    return;
                }

                // 原有的 update 消息处理
                if (data.type !== 'update') return;
                if (!selectedEl) return;
                var prop = data.prop;
                var val = data.val == null ? '' : data.val;

                if (prop === 'delete') {
                    var target = selectedEl;
                    var path = getElementPath(target, document.body);
                    var parentPath = getElementPath(target.parentElement, document.body);
                    var indexInParent = Array.prototype.indexOf.call(target.parentElement.children, target);
                    var elementHTML = target.outerHTML;

                    if (target.parentNode && typeof target.parentNode.removeChild === 'function') {
                        target.parentNode.removeChild(target);
                    } else if (typeof target.remove === 'function') {
                        target.remove();
                    }
                    selectedEl = null;
                    if (hoveredEl === target) hoveredEl = null;
                    if (editingEl === target) editingEl = null;

                    post({
                        type: 'deleted',
                        command: {
                            type: 'DeleteElement',
                            elementPath: path,
                            elementHTML: elementHTML,
                            parentPath: parentPath,
                            indexInParent: indexInParent
                        }
                    });
                    return;
                }

                if (typeof prop !== 'string' || prop === '') return;

                // 捕获旧值
                var oldValue = null;
                var path = getElementPath(selectedEl, document.body);

                if (prop === 'text') {
                    oldValue = selectedEl.textContent;
                    selectedEl.textContent = String(val);
                    post({
                        type: 'changed',
                        command: {
                            type: 'UpdateText',
                            elementPath: path,
                            oldText: oldValue,
                            newText: String(val)
                        }
                    });
                } else if (prop === 'src') {
                    oldValue = selectedEl.getAttribute('src') || '';
                    if (typeof selectedEl.setAttribute === 'function') selectedEl.setAttribute('src', String(val));
                    post({
                        type: 'changed',
                        command: {
                            type: 'UpdateAttribute',
                            elementPath: path,
                            attribute: 'src',
                            oldValue: oldValue,
                            newValue: String(val)
                        }
                    });
                } else if (prop === 'href') {
                    oldValue = selectedEl.getAttribute('href') || '';
                    if (typeof selectedEl.setAttribute === 'function') selectedEl.setAttribute('href', String(val));
                    post({
                        type: 'changed',
                        command: {
                            type: 'UpdateAttribute',
                            elementPath: path,
                            attribute: 'href',
                            oldValue: oldValue,
                            newValue: String(val)
                        }
                    });
                } else {
                    oldValue = selectedEl.style[prop] || '';
                    if (selectedEl.style) selectedEl.style[prop] = val;
                    post({
                        type: 'changed',
                        command: {
                            type: 'UpdateStyle',
                            elementPath: path,
                            property: prop,
                            oldValue: oldValue,
                            newValue: val
                        }
                    });
                }
            }

            function getElementPath(element, root) {
                var path = [];
                var current = element;
                root = root || document.body;

                while (current && current !== root && current.parentElement) {
                    var parent = current.parentElement;
                    var index = Array.prototype.indexOf.call(parent.children, current);
                    if (index === -1) break;
                    path.unshift(index);
                    current = parent;
                }

                return path;
            }

            // ---- 注册监听并通知就绪 ----
            document.addEventListener('mouseover', onMouseOver, true);
            document.addEventListener('mouseout', onMouseOut, true);
            document.addEventListener('click', onClick, true);
            document.addEventListener('dblclick', onDblClick, true);
            document.addEventListener('input', onInput, true);
            document.addEventListener('blur', onBlur, true);
            window.addEventListener('message', onMessage);
            post({
                type: 'ready'
            });
        };

        // ============================================================================
        // B) 父上下文模块（内联自 src/，去除 ESM import/export，行为保持一致）
        // ============================================================================

        // 注入脚本节点 id —— inject / exporter / message-bus 共用，仅声明一次（需求 2.3 / 10.3）。
        var INJECTED_SCRIPT_ID = '__htmledit__';

        // ---- 模块：element-tree.js（元素树管理） ----
        function buildElementTree(rootElement, parentPath) {
            parentPath = parentPath || [];
            if (!rootElement) return null;

            var node = {
                tag: rootElement.tagName.toLowerCase(),
                id: generateNodeId(parentPath),
                path: parentPath,
                children: [],
                hasChildren: rootElement.children.length > 0,
                text: getNodeText(rootElement),
                classes: Array.from(rootElement.classList || []),
                elementId: rootElement.id || null
            };

            // 递归构建子节点
            Array.from(rootElement.children).forEach(function(child, index) {
                var childPath = parentPath.concat([index]);
                var childNode = buildElementTree(child, childPath);
                if (childNode) {
                    node.children.push(childNode);
                }
            });

            return node;
        }

        function getNodeText(element) {
            if (!element) return '';
            for (var i = 0; i < element.childNodes.length; i++) {
                var node = element.childNodes[i];
                if (node.nodeType === 3) { // TEXT_NODE
                    var text = node.textContent.trim();
                    if (text) {
                        return text.length > 30 ? text.substring(0, 30) + '...' : text;
                    }
                }
            }
            return '';
        }

        function generateNodeId(path) {
            return 'node-' + path.join('-');
        }

        function renderTree(treeData, options) {
            options = options || {};
            var selectedPath = options.selectedPath || null;
            var expandedNodes = options.expandedNodes || new Set();
            var level = options.level || 0;

            if (!treeData) return '';

            var isSelected = selectedPath && JSON.stringify(treeData.path) === JSON.stringify(selectedPath);
            var isExpanded = expandedNodes.has(treeData.id) || level === 0;
            var hasChildren = treeData.children.length > 0;

            var html = '<div class="tree-node" data-level="' + level + '">';
            html += '<div class="tree-node-row' + (isSelected ? ' selected' : '') + '" ';
            html += 'data-node-id="' + treeData.id + '" ';
            html += 'data-path=\'' + JSON.stringify(treeData.path) + '\' ';
            html += 'style="padding-left: ' + (level * 16) + 'px">';

            if (hasChildren) {
                html += '<span class="tree-toggle" data-node-id="' + treeData.id + '">';
                html += isExpanded ? '▼' : '▶';
                html += '</span>';
            } else {
                html += '<span class="tree-toggle-placeholder"></span>';
            }

            html += '<span class="tree-tag">&lt;' + treeData.tag + '&gt;</span>';

            if (treeData.elementId) {
                html += '<span class="tree-id">#' + treeData.elementId + '</span>';
            } else if (treeData.classes.length > 0) {
                html += '<span class="tree-class">.' + treeData.classes[0] + '</span>';
            }

            if (treeData.text) {
                html += '<span class="tree-text">"' + escapeHtml(treeData.text) + '"</span>';
            }

            html += '</div>';

            if (hasChildren && isExpanded) {
                html += '<div class="tree-children">';
                treeData.children.forEach(function(child) {
                    html += renderTree(child, {
                        selectedPath: selectedPath,
                        expandedNodes: expandedNodes,
                        level: level + 1
                    });
                });
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function createElementTreeManager(options) {
            options = options || {};
            var iframe = options.iframe || null;
            var onNodeSelect = options.onNodeSelect || function() {};

            var treeData = null;
            var selectedPath = null;
            var expandedNodes = new Set(['node-']);

            function buildTree() {
                if (!iframe) return null;
                try {
                    var doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (!doc || !doc.body) return null;
                    treeData = buildElementTree(doc.body, []);
                    return treeData;
                } catch (e) {
                    console.error('[ElementTree] 构建树失败:', e);
                    return null;
                }
            }

            function render(container) {
                if (!container || !treeData) return;
                var html = renderTree(treeData, {
                    selectedPath: selectedPath,
                    expandedNodes: expandedNodes
                });
                container.innerHTML = html;
                bindEvents(container);
            }

            function bindEvents(container) {
                container.querySelectorAll('.tree-node-row').forEach(function(row) {
                    row.addEventListener('click', function(e) {
                        if (e.target.classList.contains('tree-toggle')) return;
                        var path = JSON.parse(this.getAttribute('data-path'));
                        selectNode(path);
                        onNodeSelect(path);
                    });
                });

                container.querySelectorAll('.tree-toggle').forEach(function(toggle) {
                    toggle.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var nodeId = this.getAttribute('data-node-id');
                        toggleNode(nodeId);
                    });
                });
            }

            function selectNode(path) {
                selectedPath = path;
                expandParents(path);
            }

            function expandParents(path) {
                for (var i = 0; i <= path.length; i++) {
                    var parentPath = path.slice(0, i);
                    var nodeId = generateNodeId(parentPath);
                    expandedNodes.add(nodeId);
                }
            }

            function toggleNode(nodeId) {
                if (expandedNodes.has(nodeId)) {
                    expandedNodes.delete(nodeId);
                } else {
                    expandedNodes.add(nodeId);
                }
            }

            function refresh(container) {
                buildTree();
                if (container) {
                    render(container);
                }
            }

            return {
                buildTree: buildTree,
                render: render,
                selectNode: selectNode,
                refresh: refresh
            };
        }

        // ---- 模块：command-history.js（基于命令模式的撤销/重做） ----
        var MAX_HISTORY_SIZE = 50;

        function createUpdateStyleCommand(elementPath, property, oldValue, newValue) {
            return {
                type: 'UpdateStyle',
                elementPath: elementPath,
                property: property,
                oldValue: oldValue,
                newValue: newValue,
                timestamp: Date.now()
            };
        }

        function createUpdateTextCommand(elementPath, oldText, newText) {
            return {
                type: 'UpdateText',
                elementPath: elementPath,
                oldText: oldText,
                newText: newText,
                timestamp: Date.now()
            };
        }

        function createUpdateAttributeCommand(elementPath, attribute, oldValue, newValue) {
            return {
                type: 'UpdateAttribute',
                elementPath: elementPath,
                attribute: attribute,
                oldValue: oldValue,
                newValue: newValue,
                timestamp: Date.now()
            };
        }

        function createDeleteElementCommand(elementPath, elementHTML, parentPath, indexInParent) {
            return {
                type: 'DeleteElement',
                elementPath: elementPath,
                elementHTML: elementHTML,
                parentPath: parentPath,
                indexInParent: indexInParent,
                timestamp: Date.now()
            };
        }

        function createCommandHistory(options) {
            options = options || {};
            var onStateChange = options.onStateChange || function() {};
            var sendMessage = options.sendMessage || function() {};

            var history = [];
            var currentIndex = -1;

            function push(command) {
                if (!command) {
                    console.log('[CommandHistory] push 被阻止 - 命令为空');
                    return;
                }

                // 如果不在栈顶，删除后面的历史
                if (currentIndex < history.length - 1) {
                    history = history.slice(0, currentIndex + 1);
                }

                history.push(command);

                // 限制历史栈大小
                if (history.length > MAX_HISTORY_SIZE) {
                    history.shift();
                } else {
                    currentIndex++;
                }

                notifyStateChange();
            }

            function undo() {
                if (!canUndo()) return false;

                var command = history[currentIndex];
                currentIndex--;

                // 执行反向操作
                executeReverse(command);

                notifyStateChange();
                return true;
            }

            function redo() {
                if (!canRedo()) return false;

                currentIndex++;
                var command = history[currentIndex];

                // 执行正向操作
                executeForward(command);

                notifyStateChange();
                return true;
            }

            function executeReverse(command) {
                switch (command.type) {
                    case 'UpdateStyle':
                        sendMessage({
                            type: 'updateStyle',
                            elementPath: command.elementPath,
                            property: command.property,
                            value: command.oldValue
                        });
                        break;

                    case 'UpdateText':
                        sendMessage({
                            type: 'updateText',
                            elementPath: command.elementPath,
                            text: command.oldText
                        });
                        break;

                    case 'UpdateAttribute':
                        sendMessage({
                            type: 'updateAttribute',
                            elementPath: command.elementPath,
                            attribute: command.attribute,
                            value: command.oldValue
                        });
                        break;

                    case 'DeleteElement':
                        sendMessage({
                            type: 'restoreElement',
                            parentPath: command.parentPath,
                            elementHTML: command.elementHTML,
                            indexInParent: command.indexInParent
                        });
                        break;
                }
            }

            function executeForward(command) {
                switch (command.type) {
                    case 'UpdateStyle':
                        sendMessage({
                            type: 'updateStyle',
                            elementPath: command.elementPath,
                            property: command.property,
                            value: command.newValue
                        });
                        break;

                    case 'UpdateText':
                        sendMessage({
                            type: 'updateText',
                            elementPath: command.elementPath,
                            text: command.newText
                        });
                        break;

                    case 'UpdateAttribute':
                        sendMessage({
                            type: 'updateAttribute',
                            elementPath: command.elementPath,
                            attribute: command.attribute,
                            value: command.newValue
                        });
                        break;

                    case 'DeleteElement':
                        sendMessage({
                            type: 'deleteElement',
                            elementPath: command.elementPath
                        });
                        break;
                }
            }

            function canUndo() {
                return currentIndex >= 0;
            }

            function canRedo() {
                return currentIndex < history.length - 1;
            }

            function clear() {
                history = [];
                currentIndex = -1;
                notifyStateChange();
            }

            function getState() {
                return {
                    size: history.length,
                    currentIndex: currentIndex,
                    canUndo: canUndo(),
                    canRedo: canRedo()
                };
            }

            function notifyStateChange() {

                    canRedo: canRedo()

            }

                undo: undo,
                redo: redo,

                canRedo: canRedo,

        // ---- 辅助函数：获取元素在父元素中的索引路径 ----
        function getElementPath(element, root) {
            var path = [];
            var current = element;
            root = root || document.body;

            while (current && current !== root && current.parentElement) {
                var parent = current.parentElement;
                var index = Array.prototype.indexOf.call(parent.children, current);
                if (index === -1) break;
                path.unshift(index);
                current = parent;
            }

            return path;
        }

        // ---- 模块：auto-saver.js（自动保存管理） ----
        var STORAGE_KEY = 'html-editor-autosave';
        var STORAGE_META_KEY = 'html-editor-autosave-meta';
        var AUTO_SAVE_DELAY = 2000;

        function createAutoSaver(options) {
            options = options || {};
            var getContent = options.getContent || function() { return { html: '', filename: '' }; };
            var onSaved = options.onSaved || function() {};
            var onRestored = options.onRestored || function() {};

            var saveTimer = null;
            var lastSavedTime = null;

            function scheduleSave() {
                if (saveTimer) {
                    clearTimeout(saveTimer);
                }
                saveTimer = setTimeout(function() {
                    saveNow();
                }, AUTO_SAVE_DELAY);
            }

            function saveNow() {
                try {
                    var content = getContent();
                    var html = content.html;
                    var filename = content.filename;

                    if (!html) {
                        console.warn('[AutoSaver] 没有内容可保存');
                        return false;
                    }

                    localStorage.setItem(STORAGE_KEY, html);

                    var meta = {
                        filename: filename || '未命名文件',
                        savedAt: Date.now(),
                        size: html.length
                    };
                    localStorage.setItem(STORAGE_META_KEY, JSON.stringify(meta));

                    lastSavedTime = Date.now();
                    onSaved(meta);

                    console.log('[AutoSaver] 保存成功:', meta);
                    return true;

                } catch (error) {
                    console.error('[AutoSaver] 保存失败:', error);
                    return false;
                }
            }

            function restore() {
                try {
                    var html = localStorage.getItem(STORAGE_KEY);
                    var metaStr = localStorage.getItem(STORAGE_META_KEY);

                    if (!html || !metaStr) {
                        return null;
                    }

                    var meta = JSON.parse(metaStr);
                    onRestored({ html: html, meta: meta });

                    console.log('[AutoSaver] 恢复成功:', meta);
                    return { html: html, meta: meta };

                } catch (error) {
                    console.error('[AutoSaver] 恢复失败:', error);
                    return null;
                }
            }

            function clear() {
                try {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem(STORAGE_META_KEY);
                    lastSavedTime = null;
                    console.log('[AutoSaver] 已清除保存内容');
                    return true;
                } catch (error) {
                    console.error('[AutoSaver] 清除失败:', error);
                    return false;
                }
            }

            function hasSavedContent() {
                try {
                    return !!localStorage.getItem(STORAGE_KEY);
                } catch (error) {
                    return false;
                }
            }

            function getSavedMeta() {
                try {
                    var metaStr = localStorage.getItem(STORAGE_META_KEY);
                    return metaStr ? JSON.parse(metaStr) : null;
                } catch (error) {
                    return null;
                }
            }

            function getLastSavedTime() {
                return lastSavedTime;
            }

            function stop() {
                if (saveTimer) {
                    clearTimeout(saveTimer);
                    saveTimer = null;
                }
            }

            return {
                scheduleSave: scheduleSave,
                saveNow: saveNow,
                restore: restore,
                clear: clear,
                hasSavedContent: hasSavedContent,
                getSavedMeta: getSavedMeta,
                getLastSavedTime: getLastSavedTime,

        function formatSaveTime(timestamp) {
            var now = Date.now();
            var diff = now - timestamp;

            if (diff < 60000) {
                return '刚刚';
            }

            if (diff < 3600000) {
                var minutes = Math.floor(diff / 60000);
                return minutes + ' 分钟前';
            }

            if (diff < 86400000) {
                var hours = Math.floor(diff / 3600000);
                return hours + ' 小时前';
            }

            var date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ---- 模块：color.js（rgb()/rgba() ↔ Hex 转换，需求 6） ----
        var COLOR_RGB_PATTERN = /^rgba?\(\s*(\d{1,3})\s*[,\s]\s*(\d{1,3})\s*[,\s]\s*(\d{1,3})\s*(?:[,/]\s*([0-9]*\.?[0-9]+)\s*)?\)$/i;

            return n.toString(16).padStart(2, '0');

        function rgbToHex(rgbString) {
            if (typeof rgbString !== 'string') return null;
            var input = rgbString.trim();
            if (input.toLowerCase() === 'transparent') return '';
            var match = input.match(COLOR_RGB_PATTERN);
            if (!match) return null;
            var r = Number(match[1]),
                g = Number(match[2]),
                b = Number(match[3]);
            if (r > 255 || g > 255 || b > 255) return null;
            var hasAlpha = match[4] !== undefined;
            var alpha = hasAlpha ? Number(match[4]) : 1;
            if (alpha < 0 || alpha > 1) return null;
            if (hasAlpha && alpha === 0 && r === 0 && g === 0 && b === 0) return '';
            var base = '#' + colorChannelToHex(r) + colorChannelToHex(g) + colorChannelToHex(b);
            if (hasAlpha && alpha < 1) return base + colorChannelToHex(Math.round(alpha * 255));
            return base;
        }

        function hexToRgb(hex) {
            if (typeof hex !== 'string') return null;
            var input = hex.trim().toLowerCase();
            if (input[0] !== '#') return null;
            var digits = input.slice(1);
            if (digits.length === 3) {
                digits = digits[0] + digits[0] + digits[1] + digits[1] + digits[2] + digits[2];
            } else if (digits.length !== 6) {
                return null;
            }
            if (!/^[0-9a-f]{6}$/.test(digits)) return null;
            return {
                r: parseInt(digits.slice(0, 2), 16),
                g: parseInt(digits.slice(2, 4), 16),
                b: parseInt(digits.slice(4, 6), 16)
            };
        }

        function ChangeCounter() {
