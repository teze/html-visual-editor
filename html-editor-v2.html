                if (!iframe) return false;
                var cw = iframe.contentWindow;
                if (!cw || typeof cw.postMessage !== 'function') return false;
                cw.postMessage(message, '*');
                return true;
            }

            function attach() {
                if (attached || !win || typeof win.addEventListener !== 'function') return false;
                listener = function messageBusListener(event) {
                    onMessage(event);
                };
                win.addEventListener('message', listener);
                attached = true;
                return true;
            }

            function detach() {
                if (!attached || !win || typeof win.removeEventListener !== 'function') return false;
                win.removeEventListener('message', listener);
                listener = null;
                attached = false;
                return true;
            }

            function setIframe(nextIframe) {
                iframe = nextIframe || null;
                return iframe;
            }

            function setHandlers(partial) {
                handlers = Object.assign({}, handlers, partial);
                return handlers;
            }

            function getIframe() {
                return iframe;
            }

            return {
                onMessage: onMessage,
                send: send,
                attach: attach,
                detach: detach,
                setIframe: setIframe,
                setHandlers: setHandlers,
                getIframe: getIframe
            };
        }

        // ============================================================================
        // C) 接线（运行于宿主父页面）
        //    顶栏「打开 / 导出」、地址栏、属性面板、状态栏与各模块互联。
        // ============================================================================

        // ---- DOM 引用 ----
        var iframe = document.getElementById('previewFrame');
        var welcomeEl = document.getElementById('welcome');
        var fileNameEl = document.getElementById('fileName');
        var exportBtnEl = document.getElementById('exportBtn');
        var statusTextEl = document.getElementById('statusText');
        var statusDotEl = document.getElementById('statusDot');
        var changeCountEl = document.getElementById('changeCount');
        var elemPathEl = document.getElementById('elemPath');
        var barHintEl = document.getElementById('barHint');
        var fileInEl = document.getElementById('fileIn');
        var dropzoneEl = document.getElementById('dropzone');
        var canvasScrollEl = document.getElementById('canvasScroll');

        // ---- 应用状态 ----
        var loaded = false; // 是否已成功加载内容（用于导出 hasContent 判定，需求 10.6）
        var currentInfo = null; // 最近一次选中元素信息
        var currentSession = null; // 当前内联编辑会话 token（每会话仅计一次，需求 4.4）
        var counter = new ChangeCounter();

        // 把属性面板根节点绑定到全局 document，使 apply*/fillForm/showFieldError 定位控件。
        propertyPanel.setupPanel(document);

        // ---- 状态栏辅助 ----
        function setStatus(text, color) {
            statusTextEl.textContent = text;
            statusDotEl.style.background = color || '#2a2a2a';
        }

        function renderCount() {
            changeCountEl.textContent = formatCountText(counter.count);
        }
        // 计数变化后刷新状态栏「N 处修改」与「就绪/已修改」指示（需求 11.3/11.4/11.5）。
        function renderStatus() {
            renderCount();
            var label = counter.statusLabel(false);
            setStatus(label, '#00d4aa');
        }

        // 预览高度自适应（UX）：让 iframe 高度跟随内容增长。
        function adjustHeight() {
            try {
                var doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
                var h = doc && doc.body ? doc.body.scrollHeight : 0;
                if (h > 300) iframe.style.height = (h + 40) + 'px';
            } catch (e) {
                /* 跨源或未就绪时忽略 */
            }
        }

        // ---- 预览框架（注入 __editorFn，固定 sandbox，等待 ready） ----
        var previewFrame = createPreviewFrame({
            iframe: iframe,
            // editorScriptProvider 是「零参工厂」：返回真正的注入编辑器函数。
            editorScriptProvider: function() {
                return __editorFn;
            },
            onReady: function() {
                setStatus('就绪', '#00d4aa');
                adjustHeight();
            },
            onError: function(message) {
                // 渲染失败（需求 2.5）或 ready 超时（需求 2.3）：保留现有内容，状态栏提示。
                setStatus(message, '#ff6b6b');
            }
        });

        // ---- 把已读取文本渲染为可编辑预览（文件加载 / 示例共用） ----
        function applyLoadedContent(text) {
            var ok = previewFrame.render(text);
            if (!ok) {
                // 不可渲染：保留欢迎界面，错误已由 previewFrame.onError 提示（需求 2.5）。
                return;
            }
            loaded = true;
            currentInfo = null;
            currentSession = null;
            counter.reset();
            propertyPanel.clearForm();
            propertyPanel.setHasSelection(false);
            propertyPanel.clearNotice();
            welcomeEl.style.display = 'none';
            iframe.style.display = 'block';
            exportBtnEl.style.display = 'flex';
            elemPathEl.textContent = '✓ 文件已加载 · 点击元素开始编辑';
            barHintEl.textContent = '双击文字可直接在预览中编辑';
            clearAlignActive();
            renderCount();
            setStatus('已加载，点击任意元素开始编辑', '#00d4aa');

            // 清空命令历史记录
            commandHistory.clear();

            // 显示元素树面板并刷新树
            treePanelEl.style.display = 'flex';
            setTimeout(function() {
                elementTreeManager.refresh(treeBodyEl);
            }, 300);
        }

        // ---- 文件加载器（点击选择 + 拖拽放入） ----
        var fileLoader = createFileLoader({
            onLoad: function(text) {
                applyLoadedContent(text);
            },
            setFilename: function(name) {
                fileNameEl.textContent = name;
            },
            onError: function(message) {
                setStatus(message, '#ff6b6b');
            },
            onNotice: function(message) {
                setStatus(message, '#f0a030');
            }
        });

        // ---- 序列化当前预览 DOM（用于导出后重注入，保留全部修改，需求 10.7） ----
        function serializeCurrentDom() {
            try {
                var doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
                if (!doc || !doc.documentElement) return null;
                // injectInto 会先剥离已存在的注入脚本再重注，故此处直接序列化即可（幂等）。
                return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
            } catch (e) {
                return null;
            }
        }

        // ---- 命令历史管理器（撤销/重做） ----
        var undoBtn = document.getElementById('undoBtn');
        var redoBtn = document.getElementById('redoBtn');

        var commandHistory = createCommandHistory({
            onStateChange: function(state) {
                // 更新撤销/重做按钮状态
                undoBtn.disabled = !state.canUndo;
                redoBtn.disabled = !state.canRedo;
            },
            sendMessage: function(message) {
                // 向 iframe 发送命令消息
                iframe.contentWindow.postMessage(message, '*');
            }
        });

        // ---- 自动保存器 ----
        var autoSaveStatusEl = document.getElementById('autoSaveStatus');

        var autoSaver = createAutoSaver({
            getContent: function() {
                var html = serializeCurrentDom();
                var filename = fileNameEl.textContent || '未命名文件';
                return { html: html, filename: filename };
            },
            onSaved: function(meta) {
                // 更新保存状态显示
                autoSaveStatusEl.textContent = '已保存 ' + formatSaveTime(meta.savedAt);
                autoSaveStatusEl.style.color = '#00d4aa';
            },
            onRestored: function(data) {
                console.log('[AutoSaver] 恢复内容:', data.meta);
            }
        });

        // ---- 元素树管理器 ----
        var treePanelEl = document.getElementById('treePanel');
        var treeBodyEl = document.getElementById('treeBody');

        var elementTreeManager = createElementTreeManager({
            iframe: iframe,
            onNodeSelect: function(path) {
                // 当用户点击树节点时，选中对应的元素
                console.log('[ElementTree] 选中节点:', path);

                // 向 iframe 发送选中消息
                try {
                    var doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (!doc || !doc.body) return;

                    // 根据路径找到元素
                    var element = doc.body;
                    for (var i = 0; i < path.length; i++) {
                        if (!element || !element.children) return;
                        element = element.children[path[i]];
                    }

                    if (element) {
                        // 模拟点击该元素
                        element.click();
                    }
                } catch (e) {
                    console.error('[ElementTree] 选中元素失败:', e);
                }

                // 重新渲染树以更新选中状态
                elementTreeManager.render(treeBodyEl);
            }
        });
            },
            onRestored: function(data) {
                console.log('[AutoSaver] 恢复内容:', data.meta);
            }
        });

        // 检查是否有未保存的内容
        if (autoSaver.hasSavedContent()) {
            var meta = autoSaver.getSavedMeta();
            if (meta && confirm('发现未保存的内容（' + meta.filename + '，保存于 ' + formatSaveTime(meta.savedAt) + '），是否恢复？')) {
                var restored = autoSaver.restore();
                if (restored) {
                    fileNameEl.textContent = restored.meta.filename;
                    applyLoadedContent(restored.html);
                    autoSaver.clear(); // 恢复后清除，避免重复提示
                }
            }
        }

        // ---- 消息总线（按 message-bus.js「推荐接线」连接各模块） ----
        var bus = createMessageBus({
            iframe: iframe,
            handlers: {
                // ready：通知预览框架就绪，进入可编辑态（需求 2.3）。
                onReady: function() {
                    previewFrame.notifyReady();
                },

                // selected：回填属性面板 + 标记存在选中元素 + 更新地址栏（需求 3.5）。
                onSelected: function(info) {
                    currentInfo = info;
                    propertyPanel.fillForm(info);
                    propertyPanel.setHasSelection(true);
                    propertyPanel.clearNotice();
                    clearAlignActive();
                    elemPathEl.textContent = (info && (info.path || info.tag)) || '— 未选中元素';

                    // 同步元素树选中状态
                    if (info && info.elementPath) {
                        elementTreeManager.selectNode(info.elementPath);
                        elementTreeManager.render(treeBodyEl);
                    }
                },

                // editing：进入 contentEditable，开启一次编辑会话（计数去重起点，需求 4.4）。
                onEditing: function() {
                    currentSession = counter.beginEditSession(counter.nextSessionId());
                    setStatus('正在编辑文字 · 点击其他地方完成', '#f0a030');
                },

                // textInput：实时文字同步；同一会话内多次 input 仅计 1（需求 4.4）。
                onTextInput: function(text) {
                    var pText = document.getElementById('pText');
                    if (pText) pText.value = text;
                    if (currentSession == null) {
                        currentSession = counter.beginEditSession(counter.nextSessionId());
                    }
                    counter.markEditSessionChanged(currentSession);
                    renderStatus();
                    adjustHeight();
                    // 自动保存
                    autoSaver.scheduleSave();
                    autoSaveStatusEl.textContent = '保存中...';
                    autoSaveStatusEl.style.color = '#f0a030';
                },

                // changed：一次成功的样式 / 属性更新 → Change_Count +1（需求 5.10）。
                onChanged: function(command) {
                    // 推送命令到历史记录
                    if (command) {
                        commandHistory.push(command);
                    }
                    counter.increment();
                    renderStatus();
                    adjustHeight();
                    // 自动保存
                    autoSaver.scheduleSave();
                    autoSaveStatusEl.textContent = '保存中...';
                    autoSaveStatusEl.style.color = '#f0a030';
                },

                // deleted：清空属性面板 + 取消选中 + 计数（需求 8.3）。
                onDeleted: function(command) {
                    // 推送命令到历史记录
                    if (command) {
                        commandHistory.push(command);
                    }
                    propertyPanel.clearForm();
                    propertyPanel.setHasSelection(false);
                    currentInfo = null;
                    counter.increment();
                    renderCount();
                    setStatus('元素已删除', '#ff6b6b');
                    elemPathEl.textContent = '— 未选中元素';
                    // 自动保存
                    autoSaver.scheduleSave();
                    autoSaveStatusEl.textContent = '保存中...';
                    autoSaveStatusEl.style.color = '#f0a030';
                }
            }
        });
        bus.attach(); // 注册 window 'message' 监听
        propertyPanel.setSender(bus.send); // 属性面板下行 update/delete 经 bus.send

        // ---- 导出（清理 → 下载 .html → 重注入恢复可编辑，需求 10） ----
        function doExport() {
            var base = (fileNameEl.textContent || 'edited').replace(/\.[^.]+$/, '') || 'edited';
            exportHtml(iframe, {
                filename: base + '-edited.html',
                hasContent: function() {
                    return loaded;
                },
                reinject: function() {
                    var dom = serializeCurrentDom();
                    if (dom) previewFrame.render(dom);
                },
                reinjectDelayMs: 200,
                onError: function(message) {
                    setStatus(message, '#ff6b6b');
                },
                onStatus: function() {
                    setStatus('已导出：' + base + '-edited.html', '#00d4aa');
                }
            });
        }

        // ---- 文字对齐按钮选中态辅助 ----
        function clearAlignActive() {
            var btns = document.querySelectorAll('.seg .abtn[data-align]');
            for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
        }

        // ============================================================================
        // 顶栏 / 拖拽 / 属性面板控件事件绑定
        // ============================================================================

        // 顶栏：打开文件 / 示例页面 / 导出。
        document.getElementById('openBtn').addEventListener('click', function() {
            fileInEl.click();
        });
        fileInEl.addEventListener('change', function() {
            fileLoader.openFile(fileInEl);
        });
        document.getElementById('demoBtn').addEventListener('click', loadDemo);
        document.getElementById('demoLink').addEventListener('click', loadDemo);
        exportBtnEl.addEventListener('click', doExport);

        // 撤销/重做按钮
        undoBtn.addEventListener('click', function() {
            commandHistory.undo();
            setStatus('已撤销', '#00d4aa');
        });
        redoBtn.addEventListener('click', function() {
            commandHistory.redo();
            setStatus('已重做', '#00d4aa');
        });

        // 键盘快捷键：Ctrl+Z 撤销，Ctrl+Y 重做
        document.addEventListener('keydown', function(e) {
            // 检查是否在输入框中
            var target = e.target;
            var isInput = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA';

            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z' && !isInput) {
                    e.preventDefault();
                    if (commandHistory.canUndo()) {
                        commandHistory.undo();
                        setStatus('已撤销', '#00d4aa');
                    }
                } else if (e.key === 'y' && !isInput) {
                    e.preventDefault();
                    if (commandHistory.canRedo()) {
                        commandHistory.redo();
                        setStatus('已重做', '#00d4aa');
                    }
                }
            }
        });

        // 拖拽放入（画布区与欢迎区 dropzone）。
        function bindDropZone(el, highlight) {
            if (!el) return;
            el.addEventListener('dragover', function(e) {
                e.preventDefault();
                if (highlight) el.classList.add('dragover');
            });
            el.addEventListener('dragleave', function() {
                if (highlight) el.classList.remove('dragover');
            });
            el.addEventListener('drop', function(e) {
                if (highlight) el.classList.remove('dragover');
                fileLoader.handleDrop(e);
            });
        }
        bindDropZone(canvasScrollEl, false);
        bindDropZone(dropzoneEl, true);
        dropzoneEl.addEventListener('click', function() {
            fileInEl.click();
        });

        // 属性面板：各控件 → apply* 入口（合法则下发 update，非法则就近提示）。
        function bind(id, evt, handler) {
            var el = document.getElementById(id);
            if (el) el.addEventListener(evt, handler);
        }

        bind('pText', 'input', function() {
            propertyPanel.applyText(this.value);
        });
        bind('pFontSize', 'input', function() {
            propertyPanel.applyFontSize(this.value);
        });
        bind('pFontWeight', 'change', function() {
            propertyPanel.applyFontWeight(this.value);
        });
        bind('pPad', 'input', function() {
            propertyPanel.applyPadding(this.value);
        });
        bind('pRadius', 'input', function() {
            propertyPanel.applyRadius(this.value);
        });
        bind('pWidth', 'input', function() {
            propertyPanel.applyWidth(this.value);
        });
        bind('pHeight', 'input', function() {
            propertyPanel.applyHeight(this.value);
        });
        bind('pSrc', 'input', function() {
            propertyPanel.applySrc(this.value);
        });
        bind('pHref', 'input', function() {
            propertyPanel.applyHref(this.value);
        });

        // 颜色控件：选择器/文本框双向联动（需求 5.11/5.12）后应用颜色样式（需求 5.4/5.5）。
        bind('pColor', 'input', function() {
            propertyPanel.onColorPick('pColor', 'pColorTxt', 'color');
            propertyPanel.applyColor(document.getElementById('pColorTxt').value);
        });
        bind('pColorTxt', 'input', function() {
            propertyPanel.onColorType('pColorTxt', 'pColor', 'color');
            propertyPanel.applyColor(this.value);
        });
        bind('pBg', 'input', function() {
            propertyPanel.onColorPick('pBg', 'pBgTxt', 'backgroundColor');
            propertyPanel.applyBackground(document.getElementById('pBgTxt').value);
        });
        bind('pBgTxt', 'input', function() {
            propertyPanel.onColorType('pBgTxt', 'pBg', 'backgroundColor');
            propertyPanel.applyBackground(this.value);
        });

        // 文字对齐按钮组（需求 5.6）。
        (function() {
            var btns = document.querySelectorAll('.seg .abtn[data-align]');
            for (var i = 0; i < btns.length; i++) {
                btns[i].addEventListener('click', function() {
                    var align = this.getAttribute('data-align');
                    var res = propertyPanel.applyTextAlign(align);
                    if (res && res.ok) {
                        clearAlignActive();
                        this.classList.add('active');
                    }
                });
            }
        })();

        // 删除元素（需求 8.1 / 8.5）。
        bind('pDelete', 'click', function() {
            propertyPanel.deleteElement();
        });

        // ============================================================================
        // 示例页面（一键体验，便于无文件时验证编辑流程）
        // ============================================================================
        var DEMO_HTML = [
            '<!DOCTYPE html>',
            '<html lang="zh"><head><meta charset="UTF-8"><title>示例：产品落地页</title>',
            '<style>',
            '*{box-sizing:border-box;margin:0;padding:0}',
            'body{font-family:-apple-system,"PingFang SC",sans-serif;color:#1a1a1a;line-height:1.6}',

            '</style></head>',
            '<body>',
            '<div class="hero"><h1>用 AI 构建你的网页</h1>',
            '<p>强大的可视化编辑器，让每个人都能轻松修改网页内容，无需技术背景</p>',

            '<div class="card"><div class="card-icon">⚡</div><h3>实时预览</h3><p>所有修改实时呈现，所见即所得，告别繁琐的代码调试</p></div>',
            '<div class="card"><div class="card-icon">📦</div><h3>一键导出</h3><p>编辑完成后导出标准 HTML 文件，可直接部署到任何服务器</p></div>',
            '</div></div>',
            '<footer><p>© 2024 HTML 可视化编辑器 · 让网页编辑变得简单</p></footer>',
            '</body></html>'
        ].join('\n');

        function loadDemo() {
            fileNameEl.textContent = 'demo-landing.html';
            applyLoadedContent(DEMO_HTML);
        }
    </script>
