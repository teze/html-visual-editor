<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HTML 可视化编辑器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#111;color:#d0d0d0;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}
.topbar{height:48px;background:#1a1a1a;border-bottom:1px solid #252525;display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;user-select:none}
.logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-right:8px}
.logo span{color:#00d4aa}
.sep{width:1px;height:20px;background:#2a2a2a;margin:0 4px}
.f1{flex:1}
.tbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;border:1px solid #2e2e2e;background:#222;color:#aaa;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap;font-family:inherit}
.tbtn:hover{background:#2a2a2a;color:#fff;border-color:#3a3a3a}
.tbtn.accent{background:#00d4aa;color:#000;border-color:#00d4aa;font-weight:600}
.tbtn.accent:hover{background:#00eebb}
.filelabel{font-size:11px;color:#444;padding:3px 10px;border-radius:4px;background:#161616;border:1px solid #222;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;display:flex;overflow:hidden}
.canvas-area{flex:1;display:flex;flex-direction:column;background:#141414;overflow:hidden;position:relative}
.canvas-bar{height:32px;background:#181818;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 14px;gap:6px;font-size:11px;flex-shrink:0}
.canvas-bar .path{color:#444;font-family:monospace;font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.canvas-bar .hint{color:#333;white-space:nowrap}
.canvas-scroll{flex:1;overflow:auto;display:flex;justify-content:center;padding:28px 28px 48px;background:#141414}
.canvas-frame{background:#fff;border-radius:6px;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 16px 48px rgba(0,0,0,.6);width:100%;max-width:1280px;position:relative;min-height:500px}
#previewFrame{width:100%;min-height:500px;border:none;border-radius:6px;display:none;background:#fff}
.welcome{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-radius:6px;padding:40px}
.welcome-icon{width:64px;height:64px;border-radius:18px;background:#0d1f1e;border:1px solid #00d4aa22;display:flex;align-items:center;justify-content:center;font-size:30px}
.welcome h2{font-size:20px;font-weight:600;color:#e8e8e8;letter-spacing:-.3px}
.welcome>p{font-size:13px;color:#555;text-align:center;line-height:1.7;max-width:300px}
.dropzone{border:1.5px dashed #2a2a2a;border-radius:12px;padding:28px 60px;text-align:center;cursor:pointer;transition:all .2s;margin-top:4px}
.dropzone:hover{border-color:#00d4aa;background:#00d4aa08}
.dz-icon{font-size:28px;margin-bottom:8px}
.dz-main{font-size:13px;color:#777;margin-bottom:3px}
.dz-sub{font-size:11px;color:#444}
.wlink{font-size:12px;color:#444;margin-top:2px}
.wlink span{color:#00d4aa;cursor:pointer}
.wlink span:hover{text-decoration:underline}
.statusbar{height:22px;background:#111;border-top:1px solid #1c1c1c;display:flex;align-items:center;padding:0 14px;gap:12px;font-size:11px;color:#3a3a3a;flex-shrink:0}
.sdot{width:5px;height:5px;border-radius:50%;background:#2a2a2a}
#statusText{color:#444}
.panel{width:256px;background:#1a1a1a;border-left:1px solid #222;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.panel-head{height:32px;padding:0 14px;display:flex;align-items:center;border-bottom:1px solid #222;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#3a3a3a;flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;padding:14px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
.panel-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#333;font-size:12px;text-align:center;padding:20px}
.panel-empty .pe-icon{font-size:32px}
.el-badge{display:inline-flex;align-items:center;padding:2px 8px;background:#00d4aa12;color:#00d4aa;border-radius:4px;font-size:11px;font-family:monospace;font-weight:600;border:1px solid #00d4aa25;margin-bottom:14px}
.ps{margin-bottom:16px}
.pl{font-size:10px;color:#444;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
input.pi,textarea.pi,select.pi{width:100%;padding:6px 9px;background:#212121;border:1px solid #2e2e2e;border-radius:5px;color:#ccc;font-size:12px;outline:none;transition:border-color .12s;font-family:inherit}
input.pi:focus,textarea.pi:focus,select.pi:focus{border-color:#00d4aa}
select.pi{cursor:pointer;appearance:none}
textarea.pi{resize:vertical;min-height:72px;line-height:1.5}
.pi-row{display:flex;gap:6px}
.pi-row .pi{flex:1}
.color-row{display:flex;gap:6px;align-items:center}
.color-row input[type="color"]{width:30px;height:30px;border-radius:5px;border:1px solid #2e2e2e;background:#212121;padding:2px;cursor:pointer;flex-shrink:0}
.color-row .pi{flex:1}
.divider{height:1px;background:#222;margin:14px 0}
.abtn{width:100%;padding:7px 10px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:5px;color:#888;font-size:12px;cursor:pointer;transition:all .12s;margin-bottom:6px;text-align:left;display:flex;align-items:center;gap:6px;font-family:inherit}
.abtn:hover{background:#252525;color:#ccc;border-color:#333}
.abtn.danger:hover{color:#ff6b6b;border-color:#ff6b6b44}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">HTML<span>Edit</span></div>
  <div class="sep"></div>
  <button class="tbtn" onclick="document.getElementById('fileIn').click()">📂 打开文件</button>
  <input type="file" id="fileIn" accept=".html,.htm" style="display:none" onchange="openFile(this)">
  <button class="tbtn" onclick="loadDemo()">✨ 示例页面</button>
  <div class="f1"></div>
  <span class="filelabel" id="fileName">未打开文件</span>
  <button class="tbtn accent" id="exportBtn" onclick="exportHTML()" style="display:none">⬇ 导出 HTML</button>
</div>

<div class="main">
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-bar">
      <span class="path" id="elemPath">— 请打开 HTML 文件开始编辑</span>
      <span class="hint" id="barHint">拖拽文件或点击「打开文件」</span>
    </div>
    <div class="canvas-scroll" id="canvasScroll">
      <div class="canvas-frame" id="canvasFrame">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">📄</div>
          <h2>HTML 可视化编辑器</h2>
          <p>打开任意 HTML 文件，在预览界面直接点击编辑内容，无需接触代码</p>
          <div class="dropzone" onclick="document.getElementById('fileIn').click()" id="dropzone">
            <div class="dz-icon">🗂️</div>
            <div class="dz-main">点击选择 HTML 文件</div>
            <div class="dz-sub">或将文件拖拽到此处</div>
          </div>
          <div class="wlink">也可以 <span onclick="loadDemo()">加载示例页面</span> 快速体验</div>
        </div>
        <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      </div>
    </div>
    <div class="statusbar">
      <div class="sdot" id="statusDot"></div>
      <span id="statusText">就绪</span>
      <span class="f1"></span>
      <span id="changeCount"></span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">属性面板</div>
    <div class="panel-body">
      <div class="panel-empty" id="panelEmpty">
        <div class="pe-icon">👆</div>
        <div>在左侧页面中<br><strong style="color:#555">点击任意元素</strong><br>即可在此编辑</div>
      </div>
      <div id="editForm" style="display:none">
        <div class="el-badge" id="elBadge">DIV</div>

        <div class="ps" id="grpText">
          <div class="pl">文字内容</div>
          <textarea class="pi" id="pText" rows="3" placeholder="元素文字..." oninput="applyProp('text',this.value)"></textarea>
          <div style="font-size:10px;color:#333;margin-top:3px">💡 双击预览中的文字可直接编辑</div>
        </div>

        <div class="ps">
          <div class="pl">字体大小 / 粗细</div>
          <div class="pi-row">
            <input class="pi" id="pFontSize" type="number" placeholder="大小" style="width:70px;flex:none" oninput="applyProp('fontSize',this.value+'px')">
            <span style="color:#333;align-self:center;font-size:11px">px</span>
            <select class="pi" id="pFontWeight" onchange="applyProp('fontWeight',this.value)">
              <option value="">粗细</option>
              <option value="300">细 300</option>
              <option value="400">正常 400</option>
              <option value="500">中 500</option>
              <option value="600">半粗 600</option>
              <option value="700">粗 700</option>
              <option value="900">黑 900</option>
            </select>
          </div>
        </div>

        <div class="ps">
          <div class="pl">文字对齐</div>
          <div class="pi-row">
            <button class="abtn" style="flex:1;justify-content:center;margin:0" onclick="applyProp('textAlign','left')">左</button>
            <button class="abtn" style="flex:1;justify-content:center;margin:0" onclick="applyProp('textAlign','center')">中</button>
            <button class="abtn" style="flex:1;justify-content:center;margin:0" onclick="applyProp('textAlign','right')">右</button>
          </div>
        </div>

        <div class="ps">
          <div class="pl">文字颜色</div>
          <div class="color-row">
            <input type="color" id="pColor" oninput="onColorPick('pColor','pColorTxt','color')">
            <input class="pi" id="pColorTxt" type="text" placeholder="#000000" oninput="onColorType('pColorTxt','pColor','color')">
          </div>
        </div>

        <div class="ps">
          <div class="pl">背景颜色</div>
          <div class="color-row">
            <input type="color" id="pBg" oninput="onColorPick('pBg','pBgTxt','backgroundColor')">
            <input class="pi" id="pBgTxt" type="text" placeholder="transparent" oninput="onColorType('pBgTxt','pBg','backgroundColor')">
          </div>
        </div>

        <div class="ps">
          <div class="pl">内边距 / 圆角 (px)</div>
          <div class="pi-row">
            <input class="pi" id="pPad" type="number" placeholder="内边距" oninput="applyProp('padding',this.value+'px')">
            <input class="pi" id="pRadius" type="number" placeholder="圆角" oninput="applyProp('borderRadius',this.value+'px')">
          </div>
        </div>

        <div class="ps">
          <div class="pl">宽度 / 高度</div>
          <div class="pi-row">
            <input class="pi" id="pWidth" type="text" placeholder="宽 (px / %)" oninput="applyProp('width',this.value)">
            <input class="pi" id="pHeight" type="text" placeholder="高 (px / auto)" oninput="applyProp('height',this.value)">
          </div>
        </div>

        <div class="ps" id="grpImg" style="display:none">
          <div class="pl">图片地址 (src)</div>
          <input class="pi" id="pSrc" type="text" placeholder="https://..." oninput="applyProp('src',this.value)">
        </div>

        <div class="ps" id="grpLink" style="display:none">
          <div class="pl">链接地址 (href)</div>
          <input class="pi" id="pHref" type="text" placeholder="https://..." oninput="applyProp('href',this.value)">
        </div>

        <div class="divider"></div>
        <button class="abtn" onclick="copyCSS()">📋 复制 CSS 选择器</button>
        <button class="abtn" onclick="copyStyle()">🎨 复制内联样式</button>
        <button class="abtn danger" onclick="deleteElem()">🗑️ 删除此元素</button>
      </div>
    </div>
  </div>
</div>

<script>
/* =====================================================
   EDITOR CODE — injected into iframe via .toString()
   Write as plain JS, no string-escaping needed at all
===================================================== */
var __editorFn = function() {
  var SKIP = 'HTML,HEAD,META,LINK,TITLE,STYLE,SCRIPT,BR,HR,NOSCRIPT'.split(',');
  var sel = null;
  var hov = null;

  function toHex(rgb) {
    if (!rgb || rgb === 'transparent' || rgb === 'rgba(0, 0, 0, 0)') return '';
    if (rgb.charAt(0) === '#') return rgb;
    var m = rgb.match(/\d+/g);
    if (!m || m.length < 3) return '';
    return '#' + [m[0], m[1], m[2]].map(function(x) {
      return (+x).toString(16).padStart(2, '0');
    }).join('');
  }

  function getPath(el) {
    var parts = [];
    var cur = el;
    while (cur && cur.tagName && cur !== document.body) {
      var p = cur.tagName.toLowerCase();
      if (cur.id) {
        p += '#' + cur.id;
      } else if (cur.className && typeof cur.className === 'string' && cur.className.trim()) {
        p += '.' + cur.className.trim().split(/\s+/).join('.');
      } else {
        var sibs = Array.from(cur.parentNode ? cur.parentNode.children : [])
          .filter(function(c) { return c.tagName === cur.tagName; });
        if (sibs.length > 1) p += ':nth-child(' + (sibs.indexOf(cur) + 1) + ')';
      }
      parts.unshift(p);
      cur = cur.parentElement;
    }
    return parts.join(' > ');
  }

  function getInfo(el) {
    var cs = window.getComputedStyle(el);
    var bgRaw = cs.backgroundColor;
    var bgHex = (bgRaw === 'rgba(0, 0, 0, 0)' || bgRaw === 'transparent') ? '' : toHex(bgRaw);
    return {
      tag: el.tagName,
      innerText: (el.innerText || '').substring(0, 500),
      color: toHex(cs.color),
      fontSize: Math.round(parseFloat(cs.fontSize)),
      fontWeight: cs.fontWeight,
      backgroundColor: bgHex,
      width: el.style.width || '',
      height: el.style.height || '',
      src: el.tagName === 'IMG' ? (el.getAttribute('src') || '') : '',
      href: el.tagName === 'A' ? (el.getAttribute('href') || '') : '',
      inlineStyle: el.getAttribute('style') || '',
      path: getPath(el)
    };
  }

  function hl(el, type) {
    if (!el) return;
    el.dataset.savedOutline = el.style.outline || '';
    el.style.outline = type === 'select' ? '2px solid #00d4aa' : '2px solid rgba(0,212,170,0.35)';
    el.style.outlineOffset = '1px';
    el.style.cursor = 'pointer';
  }

  function unhl(el) {
    if (!el) return;
    el.style.outline = el.dataset.savedOutline || '';
    el.style.outlineOffset = '';
    el.style.cursor = '';
  }

  document.addEventListener('mouseover', function(e) {
    if (SKIP.indexOf(e.target.tagName) >= 0) return;
    if (e.target === sel) return;
    if (hov && hov !== sel) unhl(hov);
    hov = e.target;
    if (hov !== sel) hl(hov, 'hover');
  }, true);

  document.addEventListener('mouseout', function(e) {
    if (hov && hov !== sel) { unhl(hov); hov = null; }
  }, true);

  document.addEventListener('click', function(e) {
    if (SKIP.indexOf(e.target.tagName) >= 0) return;
    e.preventDefault();
    e.stopPropagation();
    if (sel) { unhl(sel); if (sel.contentEditable === 'true') sel.contentEditable = 'false'; }
    sel = e.target;
    hl(sel, 'select');
    parent.postMessage({ type: 'selected', info: getInfo(sel) }, '*');
  }, true);

  document.addEventListener('dblclick', function(e) {
    if (SKIP.indexOf(e.target.tagName) >= 0) return;
    e.preventDefault();
    if (sel && sel.tagName !== 'IMG') {
      sel.contentEditable = 'true';
      sel.focus();
      parent.postMessage({ type: 'editing' }, '*');
    }
  }, true);

  document.addEventListener('input', function(e) {
    if (e.target.contentEditable === 'true' && e.target === sel) {
      parent.postMessage({ type: 'textInput', text: sel.innerText }, '*');
    }
  }, true);

  document.addEventListener('blur', function(e) {
    if (e.target.contentEditable === 'true') {
      e.target.contentEditable = 'false';
      if (sel) parent.postMessage({ type: 'selected', info: getInfo(sel) }, '*');
    }
  }, true);

  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || d.type !== 'update') return;
    if (!sel) return;
    if (d.prop === 'text') {
      var kids = Array.from(sel.childNodes);
      var tNodes = kids.filter(function(n) { return n.nodeType === 3; });
      if (tNodes.length >= 1 && tNodes.length === kids.length) {
        tNodes[0].textContent = d.val;
      } else if (kids.length === 0) {
        sel.textContent = d.val;
      }
    } else if (d.prop === 'src' && sel.tagName === 'IMG') {
      sel.setAttribute('src', d.val);
    } else if (d.prop === 'href') {
      sel.setAttribute('href', d.val);
    } else if (d.prop === 'delete') {
      unhl(sel); sel.remove(); sel = null;
      parent.postMessage({ type: 'deleted' }, '*');
      return;
    } else {
      sel.style[d.prop] = d.val;
    }
    parent.postMessage({ type: 'changed' }, '*');
  });

  parent.postMessage({ type: 'ready' }, '*');
};

/* Use .toString() so no string-escaping issues whatsoever */
function buildEditorScript() {
  var src = '(' + __editorFn.toString() + ')()';
  return '<scri' + 'pt id="__htmledit__">' + src + '</scri' + 'pt>';
}

/* =====================================================
   App state
===================================================== */
var rawHTML = '';
var changes = 0;
var currentInfo = null;
var iframe = document.getElementById('previewFrame');
var welcome = document.getElementById('welcome');
var fileName = document.getElementById('fileName');

/* =====================================================
   Load & render
===================================================== */
function openFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    rawHTML = ev.target.result;
    fileName.textContent = file.name;
    render(rawHTML);
  };
  reader.readAsText(file, 'UTF-8');
}

var DEMO = '<!DOCTYPE html>\n<html lang="zh">\n<head>\n<meta charset="UTF-8">\n<title>示例：产品落地页</title>\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:-apple-system,"PingFang SC",sans-serif;color:#1a1a1a;line-height:1.6}\n.hero{background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;padding:96px 48px;text-align:center}\n.hero h1{font-size:52px;font-weight:800;margin-bottom:18px;letter-spacing:-1px}\n.hero p{font-size:20px;opacity:.8;margin-bottom:36px;max-width:560px;margin-left:auto;margin-right:auto}\n.hero-btn{display:inline-block;padding:16px 40px;background:#fff;color:#1e3c72;border-radius:50px;font-size:16px;font-weight:700;text-decoration:none}\n.section{padding:80px 48px;max-width:1000px;margin:0 auto}\n.sec-title{font-size:36px;font-weight:700;text-align:center;margin-bottom:56px}\n.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}\n.card{background:#f7f8fa;border-radius:20px;padding:36px 28px;text-align:center;border:1px solid #eee}\n.card-icon{font-size:44px;margin-bottom:18px}\n.card h3{font-size:20px;font-weight:700;margin-bottom:10px}\n.card p{color:#666;font-size:14px}\n.cta{background:#f0f4ff;padding:72px 48px;text-align:center}\n.cta h2{font-size:32px;font-weight:700;margin-bottom:14px}\n.cta p{color:#666;margin-bottom:28px;font-size:16px}\n.cta-btn{display:inline-block;padding:16px 40px;background:#1e3c72;color:#fff;border-radius:50px;font-size:16px;font-weight:600;text-decoration:none}\nfooter{background:#111;color:#888;text-align:center;padding:28px;font-size:13px}\n</style>\n</head>\n<body>\n<div class="hero">\n  <h1>用 AI 构建你的网页</h1>\n  <p>强大的可视化编辑器，让每个人都能轻松修改网页内容，无需技术背景</p>\n  <a class="hero-btn" href="#">免费开始使用</a>\n</div>\n<div class="section">\n  <div class="sec-title">三大核心功能</div>\n  <div class="cards">\n    <div class="card"><div class="card-icon">🖱️</div><h3>点击即编辑</h3><p>直接点击页面上的任何文字或区域，即可立即修改内容</p></div>\n    <div class="card"><div class="card-icon">⚡</div><h3>实时预览</h3><p>所有修改实时呈现，所见即所得，告别繁琐的代码调试</p></div>\n    <div class="card"><div class="card-icon">📦</div><h3>一键导出</h3><p>编辑完成后导出标准 HTML 文件，可直接部署到任何服务器</p></div>\n  </div>\n</div>\n<div class="cta">\n  <h2>准备好开始了吗？</h2>\n  <p>上传您的 HTML 文件，立刻体验可视化编辑</p>\n  <a class="cta-btn" href="#">立即上传文件</a>\n</div>\n<footer><p>© 2024 HTML 可视化编辑器 · 让网页编辑变得简单</p></footer>\n</body>\n</html>';

function loadDemo() {
  rawHTML = DEMO;
  fileName.textContent = 'demo-landing.html';
  render(rawHTML);
}

function render(html) {
  var script = buildEditorScript();
  var modified = html;
  if (modified.indexOf('</body>') >= 0) {
    modified = modified.replace('</body>', script + '\n</body>');
  } else {
    modified = modified + '\n' + script;
  }
  welcome.style.display = 'none';
  iframe.style.display = 'block';
  iframe.srcdoc = modified;
  document.getElementById('exportBtn').style.display = 'flex';
  document.getElementById('elemPath').textContent = 'v 文件已加载 · 点击元素开始编辑';
  document.getElementById('barHint').textContent = '双击文字可直接在预览中编辑';
  setStatus('已加载，点击任意元素开始编辑', '#00d4aa');
}

/* =====================================================
   iframe messages
===================================================== */
window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || !d.type) return;

  if (d.type === 'ready') {
    setStatus('编辑器就绪，点击元素开始', '#00d4aa');
    adjustHeight();
  }
  if (d.type === 'selected') {
    currentInfo = d.info;
    fillForm(d.info);
    document.getElementById('elemPath').textContent = d.info.path || d.info.tag;
  }
  if (d.type === 'editing') {
    setStatus('正在编辑文字 · 点击其他地方完成', '#f0a030');
  }
  if (d.type === 'textInput') {
    document.getElementById('pText').value = d.text;
  }
  if (d.type === 'changed') {
    changes++;
    document.getElementById('changeCount').textContent = changes + ' 处修改';
    setStatus('已修改', '#00d4aa');
    adjustHeight();
  }
  if (d.type === 'deleted') {
    changes++;
    document.getElementById('changeCount').textContent = changes + ' 处修改';
    clearForm();
    setStatus('元素已删除', '#ff6b6b');
    document.getElementById('elemPath').textContent = '— 未选中元素';
  }
});

/* =====================================================
   Panel
===================================================== */
function fillForm(info) {
  document.getElementById('panelEmpty').style.display = 'none';
  document.getElementById('editForm').style.display = 'block';
  document.getElementById('elBadge').textContent = '<' + info.tag.toLowerCase() + '>';
  document.getElementById('pText').value = info.innerText || '';
  document.getElementById('pFontSize').value = info.fontSize || '';
  var fw = document.getElementById('pFontWeight');
  fw.value = '';
  for (var i = 0; i < fw.options.length; i++) {
    if (fw.options[i].value === String(info.fontWeight)) { fw.value = fw.options[i].value; break; }
  }
  setColorFields('pColor', 'pColorTxt', info.color || '');
  setColorFields('pBg', 'pBgTxt', info.backgroundColor || '');
  document.getElementById('pPad').value = '';
  document.getElementById('pRadius').value = '';
  document.getElementById('pWidth').value = info.width || '';
  document.getElementById('pHeight').value = info.height || '';
  var isImg = info.tag === 'IMG', isA = info.tag === 'A';
  document.getElementById('grpImg').style.display = isImg ? 'block' : 'none';
  document.getElementById('grpLink').style.display = isA ? 'block' : 'none';
  document.getElementById('grpText').style.display = isImg ? 'none' : 'block';
  if (isImg) document.getElementById('pSrc').value = info.src || '';
  if (isA)   document.getElementById('pHref').value = info.href || '';
}

function clearForm() {
  document.getElementById('panelEmpty').style.display = 'flex';
  document.getElementById('editForm').style.display = 'none';
  currentInfo = null;
}

function setColorFields(pickId, txtId, hex) {
  document.getElementById(txtId).value = hex;
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) document.getElementById(pickId).value = hex;
}

/* =====================================================
   Apply props
===================================================== */
function applyProp(prop, val) {
  if (iframe.contentWindow) iframe.contentWindow.postMessage({ type: 'update', prop: prop, val: val }, '*');
}

function onColorPick(pickId, txtId, prop) {
  var val = document.getElementById(pickId).value;
  document.getElementById(txtId).value = val;
  applyProp(prop, val);
}

function onColorType(txtId, pickId, prop) {
  var val = document.getElementById(txtId).value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    document.getElementById(pickId).value = val;
    applyProp(prop, val);
  }
}

function deleteElem() {
  if (confirm('确定要删除这个元素吗？')) applyProp('delete', true);
}

function copyCSS() {
  if (currentInfo && currentInfo.path) {
    navigator.clipboard.writeText(currentInfo.path)
      .then(function() { setStatus('CSS 选择器已复制', '#00d4aa'); });
  }
}

function copyStyle() {
  var s = currentInfo && currentInfo.inlineStyle;
  if (s) {
    navigator.clipboard.writeText(s)
      .then(function() { setStatus('内联样式已复制', '#00d4aa'); });
  } else {
    setStatus('该元素暂无内联样式', '#888');
  }
}

/* =====================================================
   Export
===================================================== */
function exportHTML() {
  try {
    var doc = iframe.contentDocument || iframe.contentWindow.document;
    var el = doc.getElementById('__htmledit__');
    if (el) el.remove();

    /* clean editor outlines */
    var nodes = doc.querySelectorAll('[data-saved-outline]');
    for (var i = 0; i < nodes.length; i++) {
      nodes[i].style.outline = nodes[i].dataset.savedOutline || '';
      nodes[i].style.outlineOffset = '';
      nodes[i].style.cursor = '';
    }

    var html = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var base = fileName.textContent.replace(/\.[^.]+$/, '') || 'edited';
    a.download = base + '-edited.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus('已导出：' + a.download, '#00d4aa');
    changes = 0;
    document.getElementById('changeCount').textContent = '';
    setTimeout(function() { render(rawHTML); }, 200);
  } catch(err) {
    setStatus('导出出错：' + err.message, '#ff6b6b');
  }
}

/* =====================================================
   Utils
===================================================== */
function setStatus(text, color) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').style.background = color || '#2a2a2a';
}

function adjustHeight() {
  try {
    var h = iframe.contentDocument.body.scrollHeight;
    if (h > 300) iframe.style.height = (h + 40) + 'px';
  } catch(e) {}
}

/* drag-drop on canvas */
var cs = document.getElementById('canvasScroll');
cs.addEventListener('dragover', function(e) { e.preventDefault(); });
cs.addEventListener('drop', function(e) {
  e.preventDefault();
  var file = e.dataTransfer.files[0];
  if (!file || !file.name.match(/\.html?$/i)) { setStatus('请拖入 .html 文件', '#ff6b6b'); return; }
  var reader = new FileReader();
  reader.onload = function(ev) { rawHTML = ev.target.result; fileName.textContent = file.name; render(rawHTML); };
  reader.readAsText(file, 'UTF-8');
});

/* drag-drop on welcome zone */
var dz = document.getElementById('dropzone');
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.style.borderColor = '#00d4aa'; });
dz.addEventListener('dragleave', function() { dz.style.borderColor = ''; });
dz.addEventListener('drop', function(e) {
  e.preventDefault(); dz.style.borderColor = '';
  var file = e.dataTransfer.files[0];
  if (!file || !file.name.match(/\.html?$/i)) return;
  var reader = new FileReader();
  reader.onload = function(ev) { rawHTML = ev.target.result; fileName.textContent = file.name; render(rawHTML); };
  reader.readAsText(file, 'UTF-8');
});
</script>
